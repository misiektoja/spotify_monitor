site_name: spotify_monitor
site_description: Real-time tracker for Spotify friend activity with playback synchronization and instant alerts
site_url: https://misiektoja.github.io/spotify_monitor/
repo_url: https://github.com/misiektoja/spotify_monitor
repo_name: misiektoja/spotify_monitor
edit_uri: edit/main/docs/
copyright: Licensed under GPLv3

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

plugins:
  - search

validation:
  omitted_files: warn
  absolute_links: ignore
  unrecognized_links: warn
  nav:
    omitted_files: warn
  links:
    not_found: warn
    anchors: warn

nav:
  - Home: index.md
  - Installation: installation.md
  - Quick Start: quick-start.md
  - Configuration: configuration.md
  - Usage: usage.md
  - Troubleshooting: troubleshooting.md
  - Debugging Tools: debugging.md
  - Testing: testing.md
  - About: about.md
